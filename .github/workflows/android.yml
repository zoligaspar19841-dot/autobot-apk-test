name: Build Binance Autobot APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          ls -la
          echo "=== apk_stage ==="
          ls -la apk_stage

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5 libffi-dev libssl-dev \
            build-essential

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install buildozer cython

      - name: Check clean apk_stage
        run: |
          cd apk_stage
          echo "=== apk_stage files ==="
          find . -maxdepth 2 -type f -print | sort
          echo "=== forbidden files check ==="
          if find . -type f \( -name "*.enc" -o -name "*.key" -o -name ".env" -o -iname "*secret*" -o -iname "*secrets*" \) | grep .; then
            echo "Forbidden secret file found in apk_stage"
            exit 1
          fi
          echo "OK: no secrets in apk_stage"

      - name: Compile Python files
        run: |
          cd apk_stage
          python -m py_compile main.py demo_core_engine.py
          echo "OK: Python compile"

      - name: Show buildozer spec
        run: |
          cd apk_stage
          echo "=== buildozer.spec ==="
          sed -n '1,120p' buildozer.spec

      - name: Build APK with Buildozer and save full log
        run: |
          cd apk_stage
          mkdir -p ../ci_logs
          set +e
          buildozer -v android debug 2>&1 | tee ../ci_logs/buildozer_full.log
          CODE=${PIPESTATUS[0]}
          echo "BUILDOZER_EXIT_CODE=$CODE" | tee ../ci_logs/buildozer_exit_code.txt
          echo "=== LAST 250 LINES ==="
          tail -250 ../ci_logs/buildozer_full.log
          echo "=== ERROR SEARCH ==="
          grep -niE "error:|failed|exception|traceback|no such file|command failed|exit code|undefined reference|fatal" ../ci_logs/buildozer_full.log | tail -80 || true
          exit $CODE

      - name: Verify APK exists
        if: success()
        run: |
          cd apk_stage
          echo "=== bin folder ==="
          ls -lah bin || true
          APK_COUNT=$(ls bin/*.apk 2>/dev/null | wc -l)
          echo "APK_COUNT=$APK_COUNT"
          if [ "$APK_COUNT" -lt 1 ]; then
            echo "ERROR: APK file was not created"
            exit 1
          fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BinanceAutobot-APK
          path: apk_stage/bin/*.apk

      - name: Upload Buildozer logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Buildozer-Full-Logs
          path: ci_logs/*.log
