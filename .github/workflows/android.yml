name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip build-essential git zip unzip wget openjdk-17-jdk autoconf automake libtool libtool-bin m4 gettext autopoint pkg-config libltdl-dev
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install buildozer cython

    - name: Build APK
      run: |
        set -o pipefail
        python3 -m buildozer -v android debug 2>&1 | tee buildozer_full.log
        echo "=== APK keresés ==="
        find . -name "*.apk" -print | tee apk_files.txt
        test -s apk_files.txt
        mkdir -p apk_out
        cp $(cat apk_files.txt | head -n 1) apk_out/autobot-debug.apk

    - name: Upload full log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-full-log
        path: buildozer_full.log

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: autobot-apk
        path: apk_out/*.apk
