name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show project files
        run: |
          pwd
          ls -la
          echo "=== buildozer.spec ==="
          sed -n '1,220p' buildozer.spec || true

      - name: Build APK with Buildozer Docker
        run: |
          set +e

          docker run --rm \
            --entrypoint /bin/bash \
            -v "$PWD":/home/user/hostcwd \
            -w /home/user/hostcwd \
            kivy/buildozer:latest \
            -lc 'yes y | buildozer -v android debug' 2>&1 | tee build_full_output.log

          code=${PIPESTATUS[0]}

          echo "===== LAST 250 LINES ====="
          tail -n 250 build_full_output.log || true
          echo "===== EXIT CODE: $code ====="

          exit $code

      - name: Find APK
        if: always()
        run: |
          echo "=== APK SEARCH ==="
          find . -name "*.apk" -type f || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            bin/*.apk
            **/*.apk
          if-no-files-found: error

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build_full_output.log
          if-no-files-found: ignore
