name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show restored APK
        run: |
          echo "=== Restored working APK ==="
          find prebuilt_apk -name "*.apk" -type f
          ls -lh prebuilt_apk || true

      - name: Upload working APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: prebuilt_apk/*.apk
          if-no-files-found: error
