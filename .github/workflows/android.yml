name: Build APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5 libffi-dev libssl-dev \
            build-essential

      - name: Install Buildozer with pinned Cython
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip uninstall -y cython Cython || true
          pip install "Cython==0.29.36"
          pip install buildozer
          python - <<'PY'
          import Cython
          print("CYTHON_VERSION =", Cython.__version__)
          PY

      - name: Precheck apk_stage
        run: |
          cd apk_stage
          echo "=== FILES ==="
          find . -maxdepth 2 -type f -print | sort
          echo "=== SPEC ==="
          sed -n '1,120p' buildozer.spec
          echo "=== PY COMPILE ==="
          python -m py_compile main.py demo_core_engine.py

      - name: Clean old Buildozer cache
        run: |
          rm -rf apk_stage/.buildozer
          rm -rf ~/.buildozer/android/platform/build-*
          echo "OK: build cache cleaned"

      - name: Build APK with full log
        run: |
          mkdir -p ci_logs
          cd apk_stage
          set +e

      - name: Prepare fixed debug keystore
        run: |
          mkdir -p ~/.android
          cp keystore/autobot-debug.keystore ~/.android/debug.keystore
          chmod 600 ~/.android/debug.keystore
          keytool -list -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey || true
        # PATCH 13D FIXED DEBUG KEYSTORE
          buildozer -v android debug 2>&1 | tee ../ci_logs/buildozer_full.log
          CODE=${PIPESTATUS[0]}
          echo "$CODE" > ../ci_logs/buildozer_exit_code.txt

          echo "=== ERROR SEARCH ===" | tee ../ci_logs/error_search.txt
          grep -niE "error:|failed|exception|traceback|no such file|command failed|stderr|fatal|could not|undefined|permission denied|undeclared" ../ci_logs/buildozer_full.log | tail -160 | tee -a ../ci_logs/error_search.txt || true

          echo "=== LAST 300 LINES ===" | tee ../ci_logs/last_300_lines.txt
          tail -300 ../ci_logs/buildozer_full.log | tee -a ../ci_logs/last_300_lines.txt

          exit $CODE

      - name: Verify APK exists
        if: success()
        run: |
          cd apk_stage
          ls -lah bin || true
          test -n "$(ls bin/*.apk 2>/dev/null)"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BinanceAutobot-APK
          path: apk_stage/bin/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Buildozer-Full-Logs
          path: ci_logs/*
