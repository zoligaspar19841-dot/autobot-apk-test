name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip build-essential git zip unzip wget openjdk-17-jdk autoconf automake libtool pkg-config
        python3 -m pip install --upgrade pip
        pip install buildozer cython setuptools==69.5.1

    - name: Build APK with full log
      run: |
        buildozer -v android debug 2>&1 | tee buildozer_full.log

    - name: Upload full log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-full-log
        path: buildozer_full.log

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: autobot-apk
        path: bin/*.apk
