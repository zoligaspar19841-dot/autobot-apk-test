name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y zip unzip openjdk-17-jdk python3-pip wget

    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Build APK
      run: |
        yes | buildozer -v android debug

    - name: Find APK
      run: |
        echo "APK keresés..."
        find . -name "*.apk" -type f
        test -n "$(find . -name '*.apk' -type f | head -n 1)"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: |
          bin/*.apk
          **/*.apk

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          .buildozer/**/*.log
          *.log
